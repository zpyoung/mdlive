name: Update Homebrew Tap

on:
  release:
    types: [published]

jobs:
  update-tap:
    runs-on: ubuntu-latest

    steps:
    - name: Get release version
      id: version
      run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

    - name: Download release binaries and compute checksums
      id: shas
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        BASE="https://github.com/bearded-giant/mdlive/releases/download/${{ github.ref_name }}"
        for target in x86_64-apple-darwin aarch64-apple-darwin x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
          curl -sL "$BASE/mdlive-$target" -o "mdlive-$target"
          sha=$(sha256sum "mdlive-$target" | cut -d' ' -f1)
          key=$(echo "$target" | tr '-' '_')
          echo "${key}=${sha}" >> "$GITHUB_OUTPUT"
        done

    - name: Checkout tap repo
      uses: actions/checkout@v5
      with:
        repository: bearded-giant/homebrew-tap
        token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

    - name: Update formula
      env:
        VERSION: ${{ steps.version.outputs.version }}
        SHA_X86_MACOS: ${{ steps.shas.outputs.x86_64_apple_darwin }}
        SHA_ARM_MACOS: ${{ steps.shas.outputs.aarch64_apple_darwin }}
        SHA_X86_LINUX: ${{ steps.shas.outputs.x86_64_unknown_linux_gnu }}
        SHA_ARM_LINUX: ${{ steps.shas.outputs.aarch64_unknown_linux_gnu }}
      run: |
        cat > Formula/mdlive.rb << 'FORMULA'
        class Mdlive < Formula
          desc "Markdown workspace server for AI coding agents"
          homepage "https://github.com/bearded-giant/mdlive"
          version "VERSION_PLACEHOLDER"
          license "MIT"

          on_macos do
            if Hardware::CPU.arm?
              url "https://github.com/bearded-giant/mdlive/releases/download/v#{version}/mdlive-aarch64-apple-darwin"
              sha256 "SHA_ARM_MACOS_PLACEHOLDER"
            else
              url "https://github.com/bearded-giant/mdlive/releases/download/v#{version}/mdlive-x86_64-apple-darwin"
              sha256 "SHA_X86_MACOS_PLACEHOLDER"
            end
          end

          on_linux do
            if Hardware::CPU.arm?
              url "https://github.com/bearded-giant/mdlive/releases/download/v#{version}/mdlive-aarch64-unknown-linux-gnu"
              sha256 "SHA_ARM_LINUX_PLACEHOLDER"
            else
              url "https://github.com/bearded-giant/mdlive/releases/download/v#{version}/mdlive-x86_64-unknown-linux-gnu"
              sha256 "SHA_X86_LINUX_PLACEHOLDER"
            end
          end

          def install
            bin.install Dir["mdlive-*"].first => "mdlive"
          end

          test do
            assert_match version.to_s, shell_output("#{bin}/mdlive --version")
          end
        end
        FORMULA

        sed -i "s/VERSION_PLACEHOLDER/$VERSION/" Formula/mdlive.rb
        sed -i "s/SHA_ARM_MACOS_PLACEHOLDER/$SHA_ARM_MACOS/" Formula/mdlive.rb
        sed -i "s/SHA_X86_MACOS_PLACEHOLDER/$SHA_X86_MACOS/" Formula/mdlive.rb
        sed -i "s/SHA_ARM_LINUX_PLACEHOLDER/$SHA_ARM_LINUX/" Formula/mdlive.rb
        sed -i "s/SHA_X86_LINUX_PLACEHOLDER/$SHA_X86_LINUX/" Formula/mdlive.rb

    - name: Commit and push
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add Formula/mdlive.rb
        git diff --staged --quiet && exit 0
        git commit -m "mdlive ${{ steps.version.outputs.version }}"
        git push
